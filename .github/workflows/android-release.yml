name: XpensZ Release Pipeline

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Make gradlew executable
      - name: Make Gradle executable
        run: chmod +x gradlew

      # 4. Build APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. Create source code ZIP
      - name: Create source code ZIP
        run: zip -r source-code.zip . -x "*.git*" "*.gradle*" "*.idea*" "*.DS_Store"

      # 6. Generate release tag based on date/time
      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=v$(date +'%Y.%m.%d.%H%M')" >> $GITHUB_OUTPUT

      # 7. Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/*.apk
            source-code.zip
